name: Build Apps (Android & iOS)

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  build-android:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build Web App
        run: npm run build

      - name: Setup Android SDK
        uses: android-actions/setup-android@v2

      - name: Add Android platform
        run: |
          if [ ! -d "android" ]; then
            npx cap add android
          else
            echo "Android platform already exists"
          fi

      - name: Sync Capacitor
        run: npx cap sync android

      - name: Make Gradlew executable
        run: chmod +x android/gradlew

      - name: Build APK Debug
        run: |
          cd android
          ./gradlew assembleDebug

      - name: Build AAB Release
        run: |
          cd android
          ./gradlew bundleRelease

      - name: Upload Android Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: app-android
          path: |
            android/app/build/outputs/apk/debug/app-debug.apk
            android/app/build/outputs/bundle/release/app-release.aab

  build-ios:
    runs-on: macos-15
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build Web App
        run: npm run build

      - name: Add iOS platform
        run: |
          if [ ! -d "ios" ]; then
            npx cap add ios
          else
            echo "iOS platform already exists"
          fi

      - name: Sync Capacitor
        run: npx cap sync ios

      - name: Run Fastlane Beta (Build & Sign iOS)
        id: fastlane_build
        if: ${{ secrets.APP_STORE_CONNECT_KEY_ID != '' }}
        env:
          APP_STORE_CONNECT_KEY_ID: ${{ secrets.APP_STORE_CONNECT_KEY_ID }}
          APP_STORE_CONNECT_ISSUER_ID: ${{ secrets.APP_STORE_CONNECT_ISSUER_ID }}
          APP_STORE_CONNECT_PRIVATE_KEY: ${{ secrets.APP_STORE_CONNECT_PRIVATE_KEY }}
          MATCH_GIT_URL: ${{ secrets.MATCH_GIT_URL }}
          MATCH_PASSWORD: ${{ secrets.MATCH_PASSWORD }}
        run: |
          cd ios/App
          fastlane beta
          echo "FASTLANE_SUCCESS=true" >> $GITHUB_ENV

      - name: Build Xcode Project (Archive) - Unsigned Fallback
        if: ${{ secrets.APP_STORE_CONNECT_KEY_ID == '' }}
        run: |
          echo "Building unsigned Xcode archive..."
          xcodebuild -project ios/App/App.xcodeproj \
            -scheme App \
            -sdk iphoneos \
            -configuration Release \
            CODE_SIGNING_ALLOWED=NO \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGN_IDENTITY="" \
            archive -archivePath ios/App/App.xcarchive

      - name: Export IPA - Unsigned Fallback
        if: ${{ secrets.APP_STORE_CONNECT_KEY_ID == '' }}
        run: |
          echo "Unsigned archive built. Packaging as unsigned .ipa..."
          mkdir -p ios/App/build/Payload
          cp -r ios/App/App.xcarchive/Products/Applications/App.app ios/App/build/Payload/
          cd ios/App/build
          zip -r app-unsigned.ipa Payload

      - name: Upload iOS Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: app-ios
          path: |
            ios/App/build/app-release.ipa
            ios/App/build/app-unsigned.ipa
          if-no-files-found: warn


