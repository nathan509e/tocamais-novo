name: Build Apps (Android & iOS)
# Trigger build - Fastlane SPM configuration
on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  build-android:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build Web App
        run: npm run build

      - name: Setup Android SDK
        uses: android-actions/setup-android@v2

      - name: Add Android platform
        run: |
          if [ ! -d "android" ]; then
            npx cap add android
          else
            echo "Android platform already exists"
          fi

      - name: Sync Capacitor
        run: npx cap sync android

      - name: Make Gradlew executable
        run: chmod +x android/gradlew

      - name: Build APK Debug
        run: |
          cd android
          ./gradlew assembleDebug

      - name: Build AAB Release
        run: |
          cd android
          ./gradlew bundleRelease

      - name: Upload Android Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: app-android
          path: |
            android/app/build/outputs/apk/debug/app-debug.apk
            android/app/build/outputs/bundle/release/app-release.aab

  build-ios:
    runs-on: macos-15
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build Web App
        run: npm run build

      - name: Add iOS platform
        run: |
          if [ ! -d "ios" ]; then
            npx cap add ios
          else
            echo "iOS platform already exists"
          fi

      - name: Sync Capacitor
        run: npx cap sync ios

      - name: Build and Sign iOS App (Fastlane or Unsigned Fallback)
        env:
          APP_STORE_CONNECT_KEY_ID: ${{ secrets.APP_STORE_CONNECT_KEY_ID }}
          APP_STORE_CONNECT_ISSUER_ID: ${{ secrets.APP_STORE_CONNECT_ISSUER_ID || secrets.APP_STORE_CONNECT_ISSUER }}
          APP_STORE_CONNECT_PRIVATE_KEY_BASE64: ${{ secrets.APP_STORE_CONNECT_PRIVATE_KEY_BASE64 || secrets.APP_STORE_CONNECT_PRIVATE_KEY }}
          MATCH_GIT_URL: ${{ secrets.MATCH_GIT_URL }}
          MATCH_PASSWORD: ${{ secrets.MATCH_PASSWORD }}
          MATCH_READONLY: "false"
        run: |
          if [ ! -z "$APP_STORE_CONNECT_KEY_ID" ]; then
            echo "App Store Connect credentials found. Configured Git and running Fastlane..."
            git config --global user.email "bot@fastlane.tools"
            git config --global user.name "Fastlane Bot"
            mkdir -p ios/App/fastlane
            # Trim credentials, output diagnostics, decode base64 or write raw PEM private key
            ruby -e "
            require 'base64'
            
            key_id = ENV['APP_STORE_CONNECT_KEY_ID'].to_s.strip
            issuer_id = ENV['APP_STORE_CONNECT_ISSUER_ID'].to_s.strip
            raw_key = ENV['APP_STORE_CONNECT_PRIVATE_KEY_BASE64'].to_s.strip
            
            puts '=== App Store Connect Credentials Diagnostics ==='
            puts \"Key ID: '#{key_id}' (Length: #{key_id.length}, Expected: 10)\"
            if key_id.length != 10
              puts '  WARNING: Key ID is not 10 characters long!'
            end
            
            puts \"Issuer ID: '#{issuer_id}' (Length: #{issuer_id.length}, Expected: 36)\"
            if issuer_id.length != 36
              puts '  WARNING: Issuer ID is not 36 characters long (standard UUID format)!'
            end
            
            if raw_key.empty?
              puts 'Error: Private Key secret is empty'
              exit 1
            end
            
            key = nil
            if raw_key.include?('-----BEGIN')
              puts 'Key appears to be raw PEM format.'
              key = raw_key
            else
              puts 'Attempting to decode key from base64...'
              begin
                decoded = Base64.decode64(raw_key)
                if decoded.include?('-----BEGIN')
                  puts 'Successfully decoded base64 key.'
                  key = decoded
                else
                  puts 'Decoded base64 does not contain PEM header. Using raw input.'
                  key = raw_key
                end
              rescue => e
                puts \"Base64 decoding failed: #{e.message}. Using raw input.\"
                key = raw_key
              end
            end
            
            normalized = key.gsub(/\r\n?/, \"\n\").strip + \"\n\"
            if !normalized.include?('-----BEGIN')
              puts 'WARNING: Key does not contain standard PEM header (-----BEGIN ...)'
            end
            
            # Export trimmed values to GITHUB_ENV so subsequent tools use the cleaned versions
            File.open(ENV['GITHUB_ENV'], 'a') do |f|
              f.puts \"APP_STORE_CONNECT_KEY_ID=#{key_id}\"
              f.puts \"APP_STORE_CONNECT_ISSUER_ID=#{issuer_id}\"
            end
            
            File.write('ios/App/fastlane/AuthKey_86KTM9R63W.p8', normalized)
            "
            # Convert PKCS#8 EC key to SEC1 EC key format to fix Ruby 3.x/OpenSSL "invalid curve name" parser bug on macOS
            openssl ec -in ios/App/fastlane/AuthKey_86KTM9R63W.p8 -out ios/App/fastlane/AuthKey_86KTM9R63W.p8
            cd ios/App
            fastlane beta
          else
            echo "No App Store Connect credentials found. Falling back to unsigned build..."
            echo "Building unsigned Xcode archive..."
            xcodebuild -project ios/App/App.xcodeproj \
              -scheme App \
              -sdk iphoneos \
              -configuration Release \
              CODE_SIGNING_ALLOWED=NO \
              CODE_SIGNING_REQUIRED=NO \
              CODE_SIGN_IDENTITY="" \
              archive -archivePath ios/App/App.xcarchive
            
            echo "Packaging as unsigned .ipa..."
            mkdir -p ios/App/build/Payload
            cp -r ios/App/App.xcarchive/Products/Applications/App.app ios/App/build/Payload/
            cd ios/App/build
            zip -r app-unsigned.ipa Payload
          fi


      - name: Upload iOS Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: app-ios
          path: |
            ios/App/build/app-release.ipa
            ios/App/build/app-unsigned.ipa
          if-no-files-found: warn


