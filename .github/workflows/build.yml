name: Build Apps (Android & iOS)

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  build-android:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build Web App
        run: npm run build

      - name: Setup Android SDK
        uses: android-actions/setup-android@v2

      - name: Add Android platform
        run: |
          if [ ! -d "android" ]; then
            npx cap add android
          else
            echo "Android platform already exists"
          fi

      - name: Sync Capacitor
        run: npx cap sync android

      - name: Make Gradlew executable
        run: chmod +x android/gradlew

      - name: Build APK Debug
        run: |
          cd android
          ./gradlew assembleDebug

      - name: Build AAB Release
        run: |
          cd android
          ./gradlew bundleRelease

      - name: Upload Android Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: app-android
          path: |
            android/app/build/outputs/apk/debug/app-debug.apk
            android/app/build/outputs/bundle/release/app-release.aab

  build-ios:
    runs-on: macos-15
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build Web App
        run: npm run build

      - name: Add iOS platform
        run: |
          if [ ! -d "ios" ]; then
            npx cap add ios
          else
            echo "iOS platform already exists"
          fi

      - name: Sync Capacitor
        run: npx cap sync ios

      - name: Build and Sign iOS App (Fastlane or Unsigned Fallback)
        env:
          APP_STORE_CONNECT_KEY_ID: ${{ secrets.APP_STORE_CONNECT_KEY_ID }}
          APP_STORE_CONNECT_ISSUER_ID: ${{ secrets.APP_STORE_CONNECT_ISSUER_ID }}
          APP_STORE_CONNECT_PRIVATE_KEY_BASE64: ${{ secrets.APP_STORE_CONNECT_PRIVATE_KEY_BASE64 }}
          MATCH_GIT_URL: ${{ secrets.MATCH_GIT_URL }}
          MATCH_PASSWORD: ${{ secrets.MATCH_PASSWORD }}
          MATCH_READONLY: "false"
        run: |
          if [ ! -z "$APP_STORE_CONNECT_KEY_ID" ]; then
            echo "App Store Connect credentials found. Configured Git and running Fastlane..."
            git config --global user.email "bot@fastlane.tools"
            git config --global user.name "Fastlane Bot"
            mkdir -p ios/App/fastlane
            echo "$APP_STORE_CONNECT_PRIVATE_KEY_BASE64" | base64 --decode > ios/App/fastlane/AuthKey_86KTM9R63W.p8
            # Strip Windows carriage returns (\r) to avoid OpenSSL "invalid curve name" crash on macOS
            tr -d '\r' < ios/App/fastlane/AuthKey_86KTM9R63W.p8 > ios/App/fastlane/AuthKey_86KTM9R63W_clean.p8
            mv ios/App/fastlane/AuthKey_86KTM9R63W_clean.p8 ios/App/fastlane/AuthKey_86KTM9R63W.p8
            cd ios/App
            fastlane beta
          else
            echo "No App Store Connect credentials found. Falling back to unsigned build..."
            echo "Building unsigned Xcode archive..."
            xcodebuild -project ios/App/App.xcodeproj \
              -scheme App \
              -sdk iphoneos \
              -configuration Release \
              CODE_SIGNING_ALLOWED=NO \
              CODE_SIGNING_REQUIRED=NO \
              CODE_SIGN_IDENTITY="" \
              archive -archivePath ios/App/App.xcarchive
            
            echo "Packaging as unsigned .ipa..."
            mkdir -p ios/App/build/Payload
            cp -r ios/App/App.xcarchive/Products/Applications/App.app ios/App/build/Payload/
            cd ios/App/build
            zip -r app-unsigned.ipa Payload
          fi


      - name: Upload iOS Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: app-ios
          path: |
            ios/App/build/app-release.ipa
            ios/App/build/app-unsigned.ipa
          if-no-files-found: warn


