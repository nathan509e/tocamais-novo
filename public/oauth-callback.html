<!DOCTYPE html>
<html>
<head><meta charset="utf-8"><title>Autenticando...</title></head>
<body>
<script>
const hash = window.location.hash.substring(1);
const params = new URLSearchParams(hash);
const accessToken = params.get('access_token');
const error = params.get('error');

if (error) {
  document.write('Erro: ' + error);
} else if (accessToken && window.opener) {
  window.opener.postMessage({ type: 'GOOGLE_OAUTH_TOKEN', accessToken }, window.location.origin);
  window.close();
} else {
  document.write('Nenhum token encontrado. Feche esta janela e tente novamente.');
}
</script>
</body>
</html>
